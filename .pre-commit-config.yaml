repos:
  # Python lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
      - id: ruff-format

  # Python modernization
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
      - id: pyupgrade

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args:
          - -r
          - backend

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  # Compatibility linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8

  # Dead-code detection
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args:
          - backend
          - frontend
          - tests

  # Code quality linting
  - repo: https://github.com/pylint-dev/pylint
    rev: v3.3.7
    hooks:
      - id: pylint
        name: pylint
        args:
          - --exit-zero
          - backend
          - frontend
          - tests

  # Semgrep static analysis
  - repo: https://github.com/semgrep/semgrep
    rev: v1.80.0
    hooks:
      - id: semgrep
        args:
          - --config
          - p/python
          - --config
          - p/security-audit
          - backend
          - frontend
