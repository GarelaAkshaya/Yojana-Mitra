[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
  "-ra",
  "--strict-markers",
  "--strict-config",
]

[tool.coverage.run]
branch = true
source = ["backend", "frontend"]
omit = [
  "*/__pycache__/*",
  "*/.venv/*",
  "tests/*",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
skip_covered = true
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.html]
directory = "htmlcov"

[tool.bandit]
exclude_dirs = ["tests", ".venv", "data", "models"]
skips = ["B101"]

[tool.pylint.main]
ignore = [".venv", "data", "models"]
jobs = 1
recursive = true
load-plugins = []

[tool.pylint.messages_control]
disable = [
  "broad-exception-caught",
  "duplicate-code",
  "import-error",
  "import-outside-toplevel",
  "invalid-name",
  "line-too-long",
  "missing-module-docstring",
  "missing-function-docstring",
  "missing-class-docstring",
  "protected-access",
  "too-many-locals",
  "too-many-statements",
  "too-few-public-methods",
  "unused-argument",
  "unspecified-encoding",
  "wrong-import-position",
]

[tool.pylint.format]
max-line-length = 120

[tool.vulture]
exclude = [".venv/", "data/", "models/"]
min_confidence = 80
paths = ["backend", "frontend", "tests"]
sort_by_size = true

[tool.semgrep]
exclude = [".venv", "data", "models", ".git"]

[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [".venv", "data", "models"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = ["data/", "models/", ".venv/"]
